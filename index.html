<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Горячая линия ООО "Альфа"</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #e6e5e3;
    color: #2a2c30;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    max-width: 650px;
    width: 100%;
    background-color: #ccd5eb;
    position: relative;
}

.hidden { display: none; }

select:disabled,
textarea:disabled,
textarea[readonly] {
    background-color: #f3f3f3;
    cursor: default;
}

button {
    background-color: #2a2c30;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    width: 100%;
    transition: 0.3s;
}

button:hover { opacity: 0.9; }

select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #2a2c30;
    font-size: 14px;
    box-sizing: border-box;
    background-color: #fff;
}

textarea { min-height: 150px; }

.success-message {
    display: none;
    margin-top: 15px;
    color: green;
    font-weight: bold;
    text-align: center;
}

.mouse-cursor {
    position: absolute;
    width: 24px;
    height: 24px;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(.4,0,.2,1);
    display: none;
}
</style>
</head>
<body>

<div class="container" id="container">

<svg class="mouse-cursor" id="cursor" viewBox="0 0 24 24">
<path fill="#2a2c30" d="M3 2l7 18 2-7 7-2z"/>
</svg>

<button id="startDemo">Запустить демонстрацию</button>

<div id="formWrapper" class="hidden">

<h1>Горячая Линия ООО "Альфа"</h1>

<p>
Если вам стало известно о нарушении в компании, вы можете заполнить эту форму.
Обращение рассмотрят коллеги из службы внутреннего контроля и комплаенс.
Форма полностью анонимная.
</p>

<form id="hotlineForm">
<label>Тип нарушения</label>
<select id="violationType" disabled>
<option value="">Выберите вариант</option>
<option>Недопустимое общение</option>
<option>Конфликт интересов</option>
<option>Коррупция</option>
<option>Иное</option>
</select>

<label>Ваша роль в компании</label>
<select id="role" disabled>
<option value="">Выберите вариант</option>
<option>Руководитель</option>
<option>Сотрудник</option>
<option>Клиент</option>
</select>

<label>Опишите нарушение</label>
<textarea id="description" readonly></textarea>

<button type="submit" id="submitBtn" disabled>Отправить</button>

<div class="success-message" id="successMessage">
Обращение успешно отправлено.
</div>
</form>
</div>
</div>

<script>
const text = `Я -- менеджер отдела сырьевых поставок...
Я бы мог на него повлиять, но за это хотел бы получить 5 процентов от стоимости будущего контракта.
Просьба провести проверку.`;

const cursor = document.getElementById("cursor");
const violation = document.getElementById("violationType");
const role = document.getElementById("role");
const description = document.getElementById("description");
const submitBtn = document.getElementById("submitBtn");
const successMessage = document.getElementById("successMessage");
const startButton = document.getElementById("startDemo");
const formWrapper = document.getElementById("formWrapper");

function moveCursorTo(el) {
    const rect = el.getBoundingClientRect();
    cursor.style.left = rect.left + rect.width/2 + "px";
    cursor.style.top = rect.top + rect.height/2 + "px";
}

function humanDelay(char) {
    if (char === "." || char === "!" || char === "?") return 600;
    if (char === "," ) return 350;
    if (char === "\n") return 500;
    return 40 + Math.random() * 80;
}

function typeText(i = 0) {
    if (i < text.length) {
        const char = text.charAt(i);
        description.value += char;
        setTimeout(() => typeText(i+1), humanDelay(char));
    } else {
        setTimeout(clickSubmit, 4000);
    }
}

function simulateSelect(selectElement, value) {
    moveCursorTo(selectElement);

    setTimeout(() => {
        selectElement.value = value;
    }, 800);
}

function clickSubmit() {
    moveCursorTo(submitBtn);
    setTimeout(() => {
        successMessage.style.display = "block";
    }, 800);
}

function startAnimation() {
    simulateSelect(violation, "Коррупция");

    setTimeout(() => {
        simulateSelect(role, "Сотрудник");
    }, 3000);

    setTimeout(() => {
        moveCursorTo(description);
        typeText();
    }, 6000);
}

startButton.addEventListener("click", () => {
    startButton.style.display = "none";
    formWrapper.classList.remove("hidden");
    cursor.style.display = "block";
    setTimeout(startAnimation, 800);
});
</script>

</body>
</html>
