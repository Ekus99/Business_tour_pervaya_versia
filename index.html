<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Горячая линия ООО "Альфа"</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #e6e5e3;
    color: #2a2c30;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    max-width: 650px;
    width: 100%;
    background-color: #ccd5eb;
    position: relative;
}

h1 { text-align: center; margin-bottom: 20px; }

p { font-size: 14px; margin-bottom: 25px; }

label { font-weight: bold; display: block; margin-bottom: 8px; }

select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #2a2c30;
    font-size: 14px;
    box-sizing: border-box;
    background-color: #fff;
}

textarea { min-height: 150px; resize: vertical; }

button {
    background-color: #2a2c30;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    width: 100%;
    transition: 0.3s;
}

button:hover { opacity: 0.9; }

.success-message {
    display: none;
    margin-top: 15px;
    color: green;
    font-weight: bold;
    text-align: center;
}

.mouse-cursor {
    position: absolute;
    width: 24px;
    height: 24px;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(.4,0,.2,1);
    display: none;
}

.demo-button { margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container" id="container">

<svg class="mouse-cursor" id="cursor" viewBox="0 0 24 24">
<path fill="#2a2c30" d="M3 2l7 18 2-7 7-2z"/>
</svg>

<h1>Горячая Линия ООО "Альфа"</h1>

<p>
Если вам стало известно о нарушении в компании, вы можете заполнить эту форму.
Обращение рассмотрят коллеги из службы внутреннего контроля и комплаенс.
Форма полностью анонимная.
</p>

<button id="startDemo" class="demo-button">
Запустить демонстрацию
</button>

<form id="hotlineForm">
<label>Тип нарушения</label>
<select id="violationType">
<option value="">Выберите вариант</option>
<option>Недопустимое общение</option>
<option>Конфликт интересов</option>
<option>Коррупция</option>
<option>Иное</option>
</select>

<label>Ваша роль в компании</label>
<select id="role">
<option value="">Выберите вариант</option>
<option>Руководитель</option>
<option>Сотрудник</option>
<option>Клиент</option>
</select>

<label>Опишите нарушение</label>
<textarea id="description"></textarea>

<button type="submit" id="submitBtn">Отправить</button>

<div class="success-message" id="successMessage">
Обращение успешно отправлено.
</div>
</form>
</div>

<script>
const text = `Я -- менеджер отдела сырьевых поставок. Фирма "Поле" - один из наших клиентов.
На прошлой неделе руководитель отдела закупок Николаев Андрей Петрович написал мне сообщение:

"Я мог бы повлиять на генерального директора, но за это хотел бы получить 5 процентов от стоимости будущего контракта."

Данное предложение кажется мне незаконным.
Просьба провести проверку и разъяснить порядок действий.`;

const cursor = document.getElementById("cursor");
const violation = document.getElementById("violationType");
const role = document.getElementById("role");
const description = document.getElementById("description");
const submitBtn = document.getElementById("submitBtn");
const successMessage = document.getElementById("successMessage");
const startButton = document.getElementById("startDemo");

function moveCursorTo(el, offsetY = 0) {
    const rect = el.getBoundingClientRect();
    const containerRect = document.getElementById("container").getBoundingClientRect();
    cursor.style.left = (rect.left - containerRect.left + rect.width/2) + "px";
    cursor.style.top = (rect.top - containerRect.top + rect.height/2 + offsetY) + "px";
}

function humanDelay(char) {
    if (char === "." || char === "!") return 600;
    if (char === ",") return 300;
    return 50 + Math.random() * 100;
}

function typeText(i = 0) {
    if (i < text.length) {
        const char = text.charAt(i);
        description.value += char;
        setTimeout(() => typeText(i+1), humanDelay(char));
    } else {
        setTimeout(clickSubmit, 10000);
    }
}

function simulateSelect(selectElement, value, delayStart) {
    setTimeout(() => {
        moveCursorTo(selectElement);
        selectElement.focus();
        selectElement.size = selectElement.options.length;

        const index = [...selectElement.options].findIndex(o => o.text === value);

        setTimeout(() => {
            const optionHeight = 22; 
            const offset = (index) * optionHeight;
            moveCursorTo(selectElement, offset);
        }, 1000);

        setTimeout(() => {
            selectElement.value = value;
        }, 1800);

        setTimeout(() => {
            selectElement.size = 1;
        }, 2400);

    }, delayStart);
}

function clickSubmit() {
    moveCursorTo(submitBtn);
    setTimeout(() => submitBtn.click(), 800);
}

document.getElementById("hotlineForm").addEventListener("submit", function(e){
    e.preventDefault();
    successMessage.style.display = "block";
    setTimeout(resetForm, 4000);
});

function resetForm() {
    violation.value = "";
    role.value = "";
    description.value = "";
    successMessage.style.display = "none";
    setTimeout(startAnimation, 2000);
}

function startAnimation() {
    simulateSelect(violation, "Коррупция", 500);
    simulateSelect(role, "Сотрудник", 3500);

    setTimeout(() => {
        moveCursorTo(description);
        description.focus();
        typeText();
    }, 6500);
}

startButton.addEventListener("click", () => {
    startButton.style.display = "none";
    cursor.style.display = "block";
    startAnimation();
});
</script>

</body>
</html>
