<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Горячая линия ООО "Альфа"</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #e6e5e3;
    color: #2a2c30;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    max-width: 650px;
    width: 100%;
    background-color: #ccd5eb;
    position: relative;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

p {
    font-size: 14px;
    margin-bottom: 25px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 8px;
}

select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #2a2c30;
    font-size: 14px;
    box-sizing: border-box;
    background-color: #fff;
}

textarea {
    min-height: 150px;
    resize: vertical;
}

button {
    background-color: #2a2c30;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    width: 100%;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

.success-message {
    display: none;
    margin-top: 15px;
    color: green;
    font-weight: bold;
    text-align: center;
}

/* Визуальный курсор */
.fake-cursor {
    width: 16px;
    height: 16px;
    background: #2a2c30;
    border-radius: 50%;
    position: absolute;
    pointer-events: none;
    transition: all 0.8s ease;
}
</style>
</head>
<body>

<div class="container" id="container">
    <div class="fake-cursor" id="cursor"></div>

    <h1>Горячая Линия ООО "Альфа"</h1>

    <p>
        Если вам стало известно о нарушении в компании, вы можете заполнить эту форму.
        Обращение рассмотрят коллеги из службы внутреннего контроля и комплаенс.
        Форма полностью анонимная.
    </p>

    <form id="hotlineForm">
        <label>Тип нарушения</label>
        <select id="violationType">
            <option value="">Выберите вариант</option>
            <option>Недопустимое общение</option>
            <option>Конфликт интересов</option>
            <option>Коррупция</option>
            <option>Иное</option>
        </select>

        <label>Ваша роль в компании</label>
        <select id="role">
            <option value="">Выберите вариант</option>
            <option>Руководитель</option>
            <option>Сотрудник</option>
            <option>Клиент</option>
        </select>

        <label>
            Опишите нарушение
        </label>
        <textarea id="description"></textarea>

        <button type="submit" id="submitBtn">Отправить</button>

        <div class="success-message" id="successMessage">
            Обращение успешно отправлено.
        </div>
    </form>
</div>

<script>
const text = `Я -- менеджер отдела сырьевых поставок. Фирма "Поле" - один из наших клиентов. 
На прошлой неделе руководитель отдела закупок Николаев Андрей Петрович написал мне в мессенджере сообщение следующего содержания:

"В следующем месяце мы планируем строительство нового объекта в г. Волгограде. 
Мы успешно сотрудничаем с Вашей компанией уже 5 лет, и я хотел бы, что наша совместная работа продолжилась. 
Дело в том, что у нас сменился генеральный директор, и он будет пересматривать всех действующих партнеров. 
Я бы мог на него повлиять, но за это хотел бы получить 5 процентов от стоимости будущего контракта. 
Готов обсуждать условия"

Данное предложение кажется мне незаконным. 
Просьба провести проверку и разъяснить отделу, как действовать в такой ситуации.`;

const violation = document.getElementById("violationType");
const role = document.getElementById("role");
const description = document.getElementById("description");
const cursor = document.getElementById("cursor");
const submitBtn = document.getElementById("submitBtn");
const successMessage = document.getElementById("successMessage");

function moveCursorTo(element) {
    const rect = element.getBoundingClientRect();
    const containerRect = document.getElementById("container").getBoundingClientRect();

    cursor.style.left = (rect.left - containerRect.left + rect.width / 2) + "px";
    cursor.style.top = (rect.top - containerRect.top + rect.height / 2) + "px";
}

function typeText(text, i = 0) {
    if (i < text.length) {
        description.value += text.charAt(i);
        setTimeout(() => typeText(text, i + 1), 15);
    } else {
        setTimeout(clickSubmit, 10000); // 10 секунд ожидания
    }
}

function clickSubmit() {
    moveCursorTo(submitBtn);
    setTimeout(() => {
        submitBtn.click();
    }, 800);
}

document.getElementById("hotlineForm").addEventListener("submit", function(e) {
    e.preventDefault();
    successMessage.style.display = "block";

    setTimeout(() => {
        resetForm();
    }, 4000);
});

function resetForm() {
    violation.value = "";
    role.value = "";
    description.value = "";
    successMessage.style.display = "none";
    setTimeout(startAnimation, 1500);
}

function startAnimation() {
    moveCursorTo(violation);
    setTimeout(() => {
        violation.value = "Коррупция";

        moveCursorTo(role);
        setTimeout(() => {
            role.value = "Сотрудник";

            moveCursorTo(description);
            description.focus();
            description.value = "";
            typeText(text);
        }, 1000);

    }, 1000);
}

window.onload = () => {
    setTimeout(startAnimation, 1500);
};
</script>

</body>
</html>
